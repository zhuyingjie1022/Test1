<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SFO Highest Temperature Finder</title>
    <meta
      name="description"
      content="Find the highest forecast temperature at San Francisco International Airport."
    >
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="tool-panel" aria-labelledby="app-title">
        <div class="intro-block">
          <div class="title-row">
            <span class="status-dot" aria-hidden="true"></span>
            <p class="eyebrow">Live SFO forecast</p>
          </div>
          <h1 id="app-title">Highest Temperature Finder</h1>
          <p class="location-line">San Francisco International Airport (SFO)</p>
        </div>

        <form class="controls" id="weather-form">
          <label class="control-group" for="forecast-range">
            <span>Forecast range</span>
            <select id="forecast-range" name="forecast-range">
              <option value="1">Today</option>
              <option value="3">3 days</option>
              <option value="7" selected>7 days</option>
              <option value="10">10 days</option>
              <option value="14">14 days</option>
              <option value="16">16 days</option>
            </select>
          </label>

          <button class="primary-button" type="submit" title="Find highest temperature">
            <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
              <path d="M12 5v14"></path>
              <path d="m5 12 7 7 7-7"></path>
            </svg>
            <span>Find highest</span>
          </button>
        </form>

        <div class="error-box" id="error-box" role="alert" hidden></div>

        <section class="result-grid" aria-live="polite">
          <div class="result-card peak-card">
            <p class="metric-label">Highest forecast temperature</p>
            <p class="peak-temperature" id="peak-temperature">--</p>
            <p class="metric-detail" id="peak-detail">Loading forecast...</p>
          </div>

          <div class="result-card current-card">
            <p class="metric-label">Current SFO temperature</p>
            <p class="current-temperature" id="current-temperature">--</p>
            <p class="metric-detail" id="updated-at">Waiting for weather data</p>
          </div>
        </section>

        <section class="forecast-section" aria-labelledby="daily-heading">
          <div class="section-heading">
            <h2 id="daily-heading">Daily Highs</h2>
            <span id="daily-range">--</span>
          </div>
          <div class="daily-list" id="daily-list"></div>
        </section>
      </section>

      <aside class="visual-panel" aria-label="SFO weather visualization">
        <img src="assets/sfo-weather.svg" alt="Illustration of SFO runway weather">
        <section class="hourly-card" aria-labelledby="hourly-heading">
          <div class="section-heading">
            <h2 id="hourly-heading">Peak Day Hourly Trace</h2>
            <span id="hourly-date">--</span>
          </div>
          <div class="hourly-chart" id="hourly-chart"></div>
        </section>
      </aside>
    </main>
  </body>
</html>
